"tick br\"><\u002Fspan>\n  <div class=\"frame\">\n\n    <div class=\"stamp\"><div class=\"l1\">ENGINEERING REVIEW REQUIRED<\u002Fdiv><div class=\"l2\">FINAL IMPLEMENTATION OWNED BY ENGINEERING<\u002Fdiv><\u002Fdiv>\n\n    <!-- TITLE STRIP -->\n    <div class=\"topstrip\">\n      <div class=\"left\">\n        <div class=\"row\"><b>SET<\u002Fb><span>Journey set of master set<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>PARENT<\u002Fb><span>Product &amp; Service Container<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>LAYER MAPS<\u002Fb><span>L1 Control, L2 Platform, L3 Surfaces<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>PROJECTION<\u002Fb><span>Governed user journeys<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mid\">\n        <h1>POP &amp; LADLE<\u002Fh1>\n        <div class=\"scribe\">User Journey Blueprint Set<\u002Fdiv>\n        <div class=\"scribe2\">Role-Based Journeys over the Locked Architecture<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"row\"><b>STATUS<\u002Fb><span>Provisional<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>VERSION<\u002Fb><span>v0.1<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>DATE<\u002Fb><span>2026.06.09<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>REVISION<\u002Fb><span>01<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- PARENT MAP -->\n    <div class=\"gap\"><\u002Fdiv>\n    <div class=\"pmap\">\n      <div class=\"ref\"><div class=\"pl\">Master Blueprint<\u002Fdiv><div class=\"ps\">Full system map<\u002Fdiv><\u002Fdiv>\n      <div class=\"ref\"><div class=\"pl\">Layer 1 / Control Plane<\u002Fdiv><div class=\"ps\">Upstream controller<\u002Fdiv><\u002Fdiv>\n      <div class=\"ref\"><div class=\"pl\">Layer 2 / Platform<\u002Fdiv><div class=\"ps\">Shared platform services<\u002Fdiv><\u002Fdiv>\n      <div class=\"ref\"><div class=\"pl\">Layer 3 / Surfaces<\u002Fdiv><div class=\"ps\">Governed user and tenant surfaces<\u002Fdiv><\u002Fdiv>\n      <div class=\"active\" style=\"background:var(--ink);\"><div class=\"pl\" style=\"color:#fff;\">User Journey Blueprint Set<\u002Fdiv><div class=\"ps\" style=\"color:var(--teal-soft);\">Active and expanded in this artifact <span class=\"bub t\" style=\"margin-left:4px;\">1<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"gap s\"><\u002Fdiv>\n    <div class=\"anno teal\"><div class=\"h\">Mapping Note<\u002Fdiv><p>This User Journey Blueprint Set maps to the locked blueprint set. It does not replace the master, Layer 1, Layer 2, or Layer 3 blueprints.<\u002Fp><\u002Fdiv>\n\n    <!-- ====================== J0.0 OVERVIEW ====================== -->\n    <div class=\"scard dom\">\n      <div class=\"sh\"><span class=\"no\">J0.0<\u002Fspan><h2>USER JOURNEY BLUEPRINT OVERVIEW AND JOURNEY SET INDEX<\u002Fh2><span class=\"bub t\">1<\u002Fspan>\n        <span class=\"meta\">JOURNEY SET INDEX<br>Architecture becomes user movement<\u002Fspan><\u002Fdiv>\n      <div class=\"sb\">\n        <h4 class=\"subhead\">Journey Set Index<\u002Fh4>\n        <div class=\"grid\" style=\"grid-template-columns:repeat(6,1fr);\">\n          <div class=\"ctn accent\"><div class=\"t\">J1 Household Journey<\u002Fdiv><div class=\"d\">Tenant container<\u002Fdiv><span class=\"pt mvp\" style=\"margin-top:5px;display:inline-block;\">MVP<\u002Fspan><\u002Fdiv>\n          <div class=\"ctn accent\"><div class=\"t\">J2 Owner Journey<\u002Fdiv><div class=\"d\">Accountable admin<\u002Fdiv><span class=\"pt mvp\" style=\"margin-top:5px;display:inline-block;\">MVP<\u002Fspan><\u002Fdiv>\n          <div class=\"ctn accent\"><div class=\"t\">J3 Co-Owner Journey<\u002Fdiv><div class=\"d\">Shared admin<\u002Fdiv><span class=\"pt mvp\" style=\"margin-top:5px;display:inline-block;\">MVP<\u002Fspan><\u002Fdiv>\n          <div class=\"ctn accent\"><div class=\"t\">J4 Caregiver Journey<\u002Fdiv><div class=\"d\">Daily execution<\u002Fdiv><span class=\"pt mvp\" style=\"margin-top:5px;display:inline-block;\">MVP<\u002Fspan><\u002Fdiv>\n          <div class=\"ctn accent\"><div class=\"t\">J5 Viewer Journey<\u002Fdiv><div class=\"d\">Read-mostly<\u002Fdiv><span class=\"pt mvp\" style=\"margin-top:5px;display:inline-block;\">MVP<\u002Fspan><\u002Fdiv>\n          <div class=\"ctn future\"><div class=\"t\">J6 Future Pro Journey<\u002Fdiv><div class=\"d\">Professional<\u002Fdiv><span class=\"pt p3\" style=\"margin-top:5px;display:inline-block;\">PHASE 3<\u002Fspan><\u002Fdiv>\n          <div class=\"ctn future\"><div class=\"t\">J7 Clinical Nutrition<\u002Fdiv><div class=\"d\">RDN, clinical<\u002Fdiv><span class=\"pt p3\" style=\"margin-top:5px;display:inline-block;\">PHASE 3<\u002Fspan><\u002Fdiv>\n          <div class=\"ctn future\"><div class=\"t\">J8 Senior Living<\u002Fdiv><div class=\"d\">Community<\u002Fdiv><span class=\"pt p3\" style=\"margin-top:5px;display:inline-block;\">PHASE 3<\u002Fspan><\u002Fdiv>\n          <div class=\"ctn future\"><div class=\"t\">J9 VA and Community Care<\u002Fdiv><div class=\"d\">Public benefit<\u002Fdiv><span class=\"pt p3\" style=\"margin-top:5px;display:inline-block;\">PHASE 3<\u002Fspan><\u002Fdiv>\n          <div class=\"ctn future\"><div class=\"t\">J10 Clinical Trial<\u002Fdiv><div class=\"d\">Protocol support<\u002Fdiv><span class=\"pt p3\" style=\"margin-top:5px;display:inline-block;\">PHASE 3<\u002Fspan><\u002Fdiv>\n          <div class=\"ctn future\"><div class=\"t\">J11 Enterprise<\u002Fdiv><div class=\"d\">Organization scale<\u002Fdiv><span class=\"pt p3\" style=\"margin-top:5px;display:inline-block;\">PHASE 3<\u002Fspan><\u002Fdiv>\n          <div class=\"ctn\"><div class=\"t\">J12 Summary<\u002Fdiv><div class=\"d\">Cross-journey, matrix, phase, review<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap\"><\u002Fdiv>\n        <div class=\"twocol\" style=\"grid-template-columns:1fr 1fr;\">\n          <div class=\"module\">\n            <div class=\"mh teal\">Relationship Between Journeys<\u002Fdiv>\n            <div class=\"mb\" style=\"font-family:var(--mono);font-size:10.5px;line-height:1.6;color:var(--ink2);\">\n              Household is the tenant journey. Owner creates and governs the Household. Co-Owner helps administer without billing and account deletion. Caregiver performs daily work and execution. Viewer observes with read-only recipe access plus favorite, copy, and print. Future Pro extends the Household model for professional users. Future clinical surfaces add care-team and nutrition workflows after compliance readiness. Senior living adapts the Household model into resident or community operations. VA and community care adapts the model for public benefit and community support. Clinical trial surfaces adapt the system for protocol-supported nutrition workflows. Enterprise surfaces adapt the system for organizations, reporting, governance, and scale.\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"module\">\n            <div class=\"mh\">Dependency Map<\u002Fdiv>\n            <div class=\"mb\" style=\"font-family:var(--mono);font-size:10.5px;line-height:1.6;color:var(--ink2);\">\n              Layer 1 controls role rules, feature gates, clinical review rules, publishing, taxonomy, commerce, audit, and compliance. Layer 2 executes auth, tenancy, permissions, Care Profile, recipes, model routing, planner, hydration, grocery, notifications, commerce, search, feedback, audit, and compliance. Layer 3 presents the journey surfaces.\n              <div class=\"deptags\"><span class=\"deptag ctl\">L1 controls<\u002Fspan><span class=\"deptag pow\">L2 executes<\u002Fspan><span class=\"deptag exp\">L3 presents<\u002Fspan><span class=\"deptag wri\">User writes back<\u002Fspan><span class=\"deptag rep\">Signals return<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gap\"><\u002Fdiv>\n        <div class=\"anno ink\"><div class=\"h\">Callout / Journey Set<\u002Fdiv><p>The journey set turns the locked architecture into user movement, permission checks, data writes, review gates, and return signals. Every journey reads with five lanes: user action, Layer 3 surface, Layer 2 service, Layer 1 control, and return signal.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== J1.0 HOUSEHOLD ====================== -->\n    <div class=\"scard\">\n      <div class=\"sh\"><span class=\"no\">J1.0<\u002Fspan><h2>HOUSEHOLD JOURNEY, THE TENANT JOURNEY<\u002Fh2><span class=\"bub t\">5<\u002Fspan>\n        <span class=\"meta\">ACCOUNT EQUALS HOUSEHOLD<br>The tenant boundary holds everything<\u002Fspan><\u002Fdiv>\n      <div class=\"sb\">\n        <div class=\"swim\" style=\"grid-template-columns:148px repeat(6,1fr);\">\n          <div class=\"corner\"><\u002Fdiv>\n          <div class=\"ph\">A · Create<\u002Fdiv><div class=\"ph\">B · Person and Profile<\u002Fdiv><div class=\"ph\">C · Configure<\u002Fdiv><div class=\"ph\">D · Recipes<\u002Fdiv><div class=\"ph\">E · Execute<\u002Fdiv><div class=\"ph\">F · Signals and Future<\u002Fdiv>\n          <!-- user -->\n          <div class=\"ll user\">User action<\u002Fdiv>\n          <div class=\"cell ur\"><span class=\"scell\"><b>1<\u002Fb>Household created<\u002Fspan><span class=\"scell\"><b>2<\u002Fb>Owner assigned<\u002Fspan><span class=\"scell\"><b>3<\u002Fb>Tenant boundary<\u002Fspan><span class=\"scell\"><b>4<\u002Fb>Invite members<\u002Fspan><span class=\"scell\"><b>5<\u002Fb>Assign roles<\u002Fspan><\u002Fdiv>\n          <div class=\"cell ur\"><span class=\"scell\"><b>6<\u002Fb>Add person receiving care<\u002Fspan><span class=\"scell\"><b>7<\u002Fb>Profile begins<\u002Fspan><span class=\"scell\"><b>8<\u002Fb>Add hard rules<\u002Fspan><span class=\"scell\"><b>9<\u002Fb>Caregiver context<\u002Fspan><span class=\"scell\"><b>10<\u002Fb>Kitchen capacity<\u002Fspan><span class=\"scell\"><b>11<\u002Fb>Accepted and refused meals<\u002Fspan><span cl "deptag wri\">Clinical notes and review<\u002Fspan><span class=\"deptag rep\">Clinical review activity<\u002Fspan><\u002Fdiv>\n        <div class=\"gap s\"><\u002Fdiv>\n        <div class=\"threecol\">\n          <div class=\"anno rose\"><div class=\"h\">Callout<\u002Fdiv><p>Clinical nutrition surfaces are Phase 3 and compliance-gated.<\u002Fp><\u002Fdiv>\n          <div class=\"anno\"><div class=\"h\">Callout<\u002Fdiv><p>Clinical users support review and coordination. The system must avoid pretending to prescribe care.<\u002Fp><\u002Fdiv>\n          <div class=\"anno crim\"><div class=\"h\">Callout<\u002Fdiv><p>Clinical nutrition workflows require clinical and compliance review before launch.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- J8 SENIOR LIVING -->\n    <div class=\"scard\">\n      <div class=\"sh p3\"><span class=\"no\">J8.0<\u002Fspan><h2>FUTURE SENIOR LIVING JOURNEY<\u002Fh2>\n        <span class=\"meta\">PHASE 3 RESIDENT AND COMMUNITY WORKFLOW<\u002Fspan><\u002Fdiv>\n      <div class=\"sb\">\n        <div class=\"sub\" style=\"margin-bottom:7px;\">Users: community administrator, dining director, care manager, RDN, caregiver, family viewer, resident or patient panel<\u002Fdiv>\n        <div class=\"chiprow\" style=\"margin-bottom:6px;\">\n          <span class=\"chip future s\">Community setup<\u002Fspan><span class=\"chip future s\">Resident panel setup<\u002Fspan><span class=\"chip future s\">Resident Care Profile intake<\u002Fspan><span class=\"chip future s\">Kitchen and dining capacity mapping<\u002Fspan><span class=\"chip future s\">Dietary constraints and hard rules<\u002Fspan>\n          <span class=\"chip future s\">Menu and recipe library alignment<\u002Fspan><span class=\"chip future s\">Resident-specific recipe copy<\u002Fspan><span class=\"chip future s\">Hydration tracking<\u002Fspan><span class=\"chip future s\">Meal acceptance and refusal<\u002Fspan><span class=\"dia amber\">Rejection Routing<\u002Fspan>\n          <span class=\"chip future s\">Family or caregiver handoff<\u002Fspan><span class=\"chip future s\">Community reporting<\u002Fspan><span class=\"dia\">Governance and audit gate<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"module\" style=\"margin-bottom:8px;\"><div class=\"mh ref\">Dependencies<\u002Fdiv><div class=\"mb\" style=\"font-family:var(--mono);font-size:10px;line-height:1.55;color:var(--ink2);\">Household model adapts into resident or community tenant model. Role and permission rules expand for organizational users. Care Profile remains the personalization source of truth. Kitchen capacity expands from Household kitchen to community kitchen, dining room, and resident room context. Audit and compliance boundaries become mandatory before launch.<\u002Fdiv><\u002Fdiv>\n        <div class=\"threecol\">\n          <div class=\"anno rose\"><div class=\"h\">Callout<\u002Fdiv><p>Senior living is Phase 3.<\u002Fp><\u002Fdiv>\n          <div class=\"anno\"><div class=\"h\">Callout<\u002Fdiv><p>Resident workflows require stronger tenant, role, consent, audit, and reporting controls.<\u002Fp><\u002Fdiv>\n          <div class=\"anno\"><div class=\"h\">Callout<\u002Fdiv><p>Community execution must still respect individual Care Profiles and hard rules.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- J9 VA -->\n    <div class=\"scard\">\n      <div class=\"sh p3\"><span class=\"no\">J9.0<\u002Fspan><h2>FUTURE VA AND COMMUNITY CARE JOURNEY<\u002Fh2>\n        <span class=\"meta\">PHASE 3 PUBLIC BENEFIT AND COMMUNITY SUPPORT<\u002Fspan><\u002Fdiv>\n      <div class=\"sb\">\n        <div class=\"sub\" style=\"margin-bottom:7px;\">Users: veteran, family caregiver, community care coordinator, VA-connected partner, nutrition support partner, volunteer or community support role where permitted<\u002Fdiv>\n        <div class=\"chiprow\" style=\"margin-bottom:6px;\">\n          <span class=\"dia\">Program eligi fore these journeys become implementation requirements. Journey pages do not replace the master or layer blueprints.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== LEGEND, CALLOUTS ====================== -->\n    <div class=\"gap\"><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;\">\n      <div class=\"legend\">\n        <div class=\"lh\">Legend<\u002Fdiv>\n        <div class=\"lb\">\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:12px;border:2px dashed var(--ink3);\"><\u002Fspan><\u002Fspan>Heavy top reference band: upstream Control Plane<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:12px;border:2px dashed var(--teal);\"><\u002Fspan><\u002Fspan>Middle reference band: shared Platform services<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:12px;border:3px solid var(--ink);background:rgba(29,111,106,.08);\"><\u002Fspan><\u002Fspan>Large bottom band: active user journey or surface<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"scell\" style=\"margin:0;\">Aa<\u002Fspan><\u002Fspan>Solid box: current or near-term journey step<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"scell fut\" style=\"margin:0;\">Aa<\u002Fspan><\u002Fspan>Dashed box: future or compliance-gated step<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:30px;height:14px;border:3px double var(--ink);\"><\u002Fspan><\u002Fspan>Double-line box: system of record write<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"dia\" style=\"margin:0;\">G<\u002Fspan><\u002Fspan>Gate diamond: eligibility, permission, review, payment, phase, compliance<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"stop\" style=\"margin:0;\">Stop<\u002Fspan><\u002Fspan>Crimson stop: denied, blocked, restricted, unavailable<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"lock\" style=\"margin:0;\">Lock<\u002Fspan><\u002Fspan>Lock: permission, PHI, compliance, or role restriction<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt amber\">REV<\u002Fspan><\u002Fspan>Amber tag: review, pending, caveat, queued, Phase 2<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt teal\">OK<\u002Fspan><\u002Fspan>Teal tag: active, approved, available, completed, governed<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt p3\">P3<\u002Fspan><\u002Fspan>Rose tag: future or Phase 3, used sparingly<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt mvp\">MVP<\u002Fspan><\u002Fspan>Phase tag: MVP, Phase 2, or Phase 3<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"mono\" style=\"font-size:8px;font-weight:700;\">5 LANES<\u002Fspan><\u002Fspan>Each journey: user action, L3 surface, L2 service, L1 control, return signal<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"calidx\">\n        <div class=\"ch\">Key Callouts<\u002Fdiv>\n        <ul>\n          <li><span class=\"bub t\">1<\u002Fspan><span>User journeys map to the locked blueprint set.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">2<\u002Fspan><span>Layer 1 controls every journey through rules, gates, policy, taxonomy, review, commerce, audit, and compliance.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">3<\u002Fspan><span>Layer 2 executes every journey through shared services.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">4<\u002Fspan><span>Layer 3 displays and captures every user action.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">5<\u002Fspan><span>Household is the tenant journey.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">6<\u002Fspan><span>Owner is the accountable Household administrator.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">7<\u002Fspan><span>Co-Owner helps administer but cannot manage billing or delete the account.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">8<\u002Fspan><span>Caregiver executes daily work.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">9<\u002Fspan><span>Viewer is read-mostly with favorite, copy, and print.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">10<\u002Fspan><span>Care Profile is the personalization source of truth.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">11<\u002Fspan><span>Hard rules are deterministic boundaries.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">12<\u002Fspan><span>Every generated or adapted recipe passes through the Clinical Review Gate.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub r\">13<\u002Fspan><span>Rejection Routing turns refused meals into the next practical option.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">14<\u002Fspan><span>Kitchen capacity changes execution.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">15<\u002Fspan><span>Web and mobile share one backend.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub a\">16<\u002Fspan><span>Feedback, audit, model, activity, commerce, and compliance signals flow back to Layer 1.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub r\">17<\u002Fspan><span>Future Pro and clinical journeys are Phase 3 and require review.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub r\">18<\u002Fspan><span>Senior living, VA, clinical trial, and enterprise journeys are future governed extensions.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">19<\u002Fspan><span>Journey pages do not replace the master or layer blueprints.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">20<\u002Fspan><span>These journeys become user flows, wireframes, and product requirements only after review.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n
