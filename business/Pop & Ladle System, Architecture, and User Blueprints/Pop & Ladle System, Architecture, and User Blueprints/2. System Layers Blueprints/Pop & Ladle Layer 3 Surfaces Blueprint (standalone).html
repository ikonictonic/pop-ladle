eet{box-shadow:none;width:100%;}\n    @page{size:landscape;margin:8mm;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"sheet\">\n  <span class=\"tick tl\"><\u002Fspan><span class=\"tick tr\"><\u002Fspan><span class=\"tick bl\"><\u002Fspan><span class=\"tick br\"><\u002Fspan>\n  <div class=\"frame\">\n\n    <div class=\"stamp\"><div class=\"l1\">ENGINEERING REVIEW REQUIRED<\u002Fdiv><div class=\"l2\">FINAL IMPLEMENTATION OWNED BY ENGINEERING<\u002Fdiv><\u002Fdiv>\n\n    <!-- TITLE STRIP -->\n    <div class=\"topstrip\">\n      <div class=\"left\">\n        <div class=\"row\"><b>SET<\u002Fb><span>L3 of master set<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>PARENT<\u002Fb><span>Product &amp; Service Container<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>UPSTREAM<\u002Fb><span>Layer 1 Control Plane<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>PLATFORM<\u002Fb><span>Layer 2 Platform<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mid\">\n        <h1>POP &amp; LADLE<\u002Fh1>\n        <div class=\"scribe\">Layer 3 Surfaces Blueprint<\u002Fdiv>\n        <div class=\"scribe2\">Governed User and Tenant Surfaces Deep Dive<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"row\"><b>STATUS<\u002Fb><span>Provisional<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>VERSION<\u002Fb><span>v0.1<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>DATE<\u002Fb><span>2026.06.09<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><b>REVISION<\u002Fb><span>01<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- PARENT MAP -->\n    <div class=\"gap\"><\u002Fdiv>\n    <div class=\"pmap\">\n      <div class=\"ref\"><div class=\"pl\">Layer 1 / Control Plane<\u002Fdiv><div class=\"ps\">Upstream controller<\u002Fdiv><\u002Fdiv>\n      <div class=\"ref\"><div class=\"pl\">Layer 2 / Platform<\u002Fdiv><div class=\"ps\">Shared platform services<\u002Fdiv><\u002Fdiv>\n      <div class=\"active\"><div class=\"pl\">Layer 3 / Surfaces<\u002Fdiv><div class=\"ps\">Active and expanded in this blueprint<\u002Fdiv><\u002Fdiv>\n      <div class=\"note\"><div class=\"pl\">Mapping Note <span class=\"bub t\" style=\"margin-left:6px;\">16<\u002Fspan><\u002Fdiv><div class=\"ps\">This Layer 3 blueprint maps to the master system blueprint and depends on the Layer 1 Control Plane and Layer 2 Platform blueprints. It does not replace any existing blueprint.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ARROW KEY -->\n    <div class=\"gap\"><\u002Fdiv>\n    <div class=\"arrowkey\">\n      <div>\n        <div class=\"akh\" style=\"color:var(--teal);\"><span class=\"arrowdn\"><\u002Fspan>Layer 1 to Layer 3 (through Layer 2)<\u002Fdiv>\n        <div class=\"akl\">Controls visible permissions · Publishing eligibility · Feature gates · Review status labels · Compliance gates · Commerce rules · Smart Filtering availability · Role-based action visibility<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"akh\" style=\"color:var(--ink);\"><span class=\"miniglyph gdown\" style=\"border-top-color:var(--ink);\"><\u002Fspan>Layer 2 to Layer 3<\u002Fdiv>\n        <div class=\"akl\">Authenticates · Authorizes · Personalizes · Serves data · Runs workflows · Sends notifications · Routes commerce · Returns search · Displays recipe, plan, hydration, and review status · Returns Household data and allowed actions<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"akh\" style=\"color:var(--ink);\"><span class=\"miniglyph gup\" style=\"border-bottom-color:var(--ink);\"><\u002Fspan>Layer 3 to Layer 2<\u002Fdiv>\n        <div class=\"akl\">Creates profiles · Updates hard rules · Adds recipes · Runs generation · Copies, edits, favorites, prints recipes · Logs hydration, food, refusals · Notes · Handoffs · Feedback · Grocery and commerce · Triggers notifications · Captures voice · Requests data export<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"akh\" style=\"color:var(--amber);\"><span class=\"arrowup\"><\u002Fspan>Layer 2 to Layer 1<\u002Fdiv>\n        <div class=\"akl\">Reports · Queues · Alerts · Audits · Logs model runs · Summarizes usage, review outcomes, system health, compliance events, commerce activity, and feedback signals<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== L3.0 OVERVIEW ====================== -->\n    <div class=\"scard dom\">\n      <div class=\"sh\"><span class=\"no\">L3.0<\u002Fspan><h2>LAYER 3 SURFACES OVERVIEW<\u002Fh2><span class=\"bub t\">1<\u002Fspan><span class=\"bub\">4<\u002Fspan>\n        <span class=\"meta\">GOVERNED EXPERIENCE LAYER<br>Beneath control plane and platform<\u002Fspan><\u002Fdiv>\n      <div class=\"sb\">\n        <div class=\"refband\" style=\"margin-bottom:8px;\">\n          <span class=\"rtag\">Layer 1 / Control Plane (reference)<\u002Fspan>\n          <div class=\"chiprow\" style=\"margin-top:3px;\">\n            <span class=\"chip ref s\">L1.1 Personnel and Permissions<\u002Fspan><span class=\"chip ref s\">L1.2 Global Settings<\u002Fspan><span class=\"chip ref s\">L1.3 Model Route Registry<\u002Fspan>\n            <span class=\"chip ref s\">L1.4 Recipe and Clinical Review Control<\u002Fspan><span class=\"chip ref s\">L1.5 Library, Taxonomy, Publishing<\u002Fspan><span class=\"chip ref s\">L1.6 Commerce Control<\u002Fspan>\n            <span class=\"chip ref s\">L1.7 Compliance, Audit, Logs, Queues, Reporting<\u002Fspan><span class=\"chip ref s\">L1.8 Control Flow Map<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"refband\" style=\"margin-bottom:8px;\">\n          <span class=\"rtag\">Layer 2 / Platform (reference)<\u002Fspan>\n          <div class=\"chiprow\" style=\"margin-top:3px;\">\n            <span class=\"chip l2 s\">L2.1 Shared Backend APIs<\u002Fspan><span class=\"chip l2 s\">L2.2 Identity and Tenant<\u002Fspan><span class=\"chip l2 s\">L2.3 Care Intelligence<\u002Fspan>\n ional review activity<\u002Fspan><span class=\"chip s\">Clinical notes<\u002Fspan><span class=\"chip s\">Care plan aligned nutrition events<\u002Fspan><span class=\"chip s\">Resident or patient activity<\u002Fspan><span class=\"chip s\">Enterprise reporting events<\u002Fspan><span class=\"chip s\">Charting readiness events<\u002Fspan><span class=\"chip s\">Integration requests<\u002Fspan><span class=\"chip s\">Clinical trial support events<\u002Fspan><span class=\"chip s\">Audit events<\u002Fspan><span class=\"chip s\">Compliance events<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"depcol\"><div class=\"dh rep\"><span class=\"miniglyph gup\"><\u002Fspan>Reported to Layer 1<\u002Fdiv><div class=\"db chiprow\"><span class=\"chip amber s\">Professional usage<\u002Fspan><span class=\"chip amber s\">Clinical review activity<\u002Fspan><span class=\"chip amber s\">Enterprise reports<\u002Fspan><span class=\"chip amber s\">Compliance events<\u002Fspan><span class=\"chip amber s\">Access logs<\u002Fspan><span class=\"chip amber s\">Audit logs<\u002Fspan><span class=\"chip amber s\">Integration health<\u002Fspan><span class=\"chip amber s\">Clinical workflow signals<\u002Fspan><span class=\"chip amber s\">Resident or patient activity summaries<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gap\"><\u002Fdiv>\n        <div class=\"twocol\">\n          <div class=\"anno rose\"><div class=\"h\">Callout / Phase 3 <span class=\"bub r\" style=\"margin-left:4px;\">15<\u002Fspan><\u002Fdiv><p>Future Pro and clinical surfaces are Phase 3 and require engineering, clinical, and compliance review.<\u002Fp><\u002Fdiv>\n          <div class=\"anno amber\"><div class=\"h\">Callout / Phased Scaling<\u002Fdiv><p>Profile-based PHI workflows and Smart Filtering scale after compliance readiness.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== L3.11 DEPENDENCY MAP ====================== -->\n    <div class=\"scard dom\">\n      <div class=\"sh\"><span class=\"no\">L3.11<\u002Fspan><h2>DEPENDENCY MAP BETWEEN LAYER 1, LAYER 2, AND LAYER 3 SURFACES<\u002Fh2>\n        <span class=\"meta\">SUMMARY DEPENDENCY MAP<br>Controls down, services across, activity up<\u002Fspan><\u002Fdiv>\n      <div class=\"sb\">\n        <div class=\"refband\">\n          <span class=\"rtag\">Layer 1 / Control Plane (reference)<\u002Fspan>\n          <div class=\"chiprow\" style=\"margin-top:3px;\">\n            <span class=\"chip ref s\">L1.1 Personnel and Permissions<\u002Fspan><span class=\"chip ref s\">L1.2 Global System Settings<\u002Fspan><span class=\"chip ref s\">L1.3 Model Route Registry<\u002Fspan><span class=\"chip ref s\">L1.4 Recipe Generation and Clinical Review<\u002Fspan>\n            <span class=\"chip ref s\">L1.5 Master Library, Taxonomy, Categories, Publishing<\u002Fspan><span class=\"chip ref s\">L1.6 Product, Affiliate, Commerce, Retailer Routing<\u002Fspan><span class=\"chip ref s\">L1.7 Compliance, Audit, Logs, Queues, Reporting<\u002Fspan><span class=\"chip ref s\">L1.8 Control Flow Map<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:center;gap:60px;margin:7px 0;\">\n          <span style=\"display:flex;flex-direction:column;align-items:center;color:var(--teal);\"><span class=\"mono\" style=\"font-size:9px;letter-spacing:.06em;\">CONTROLS · CONFIGURES · GATES · PUBLISHES · MONITORS · AUDITS<\u002Fspan><span class=\"arrowdn\"><\u002Fspan><\u002Fspan>\n          <span style=\"display:flex;flex-direction:column;align-items:center;color:var(--amber);\"><span class=\"arrowup\"><\u002Fspan><span class=\"mono\" style=\"font-size:9px;letter-spacing:.06em;\">REPORTS · QUEUES · ALERTS · AUDITS · LOGS MODEL RUNS · SUMMARIZES<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"refband\">\n          <span class=\"rtag\">Layer 2 / Platform (reference)<\u002Fspan>\n          <div class=\"chiprow\" style=\"margin-top:3px;\">\n            <span class=\"chip l2 s\">L2.1 Shared Backend APIs<\u002Fspan><span class=\"chip l2 s\">L2.2 Identity and Tenant Platform<\u002Fspan><span class=\"chip l2 s\">L2.3 Care Intelligence Platform<\u002Fspan><span class=\"chip l2 s\">L2.4 Recipe Platform<\u002Fspan><span class=\"chip l2 s\">L2.5 Daily Execution Platform<\u002Fspan>\n            <span class=\"chip l2 s\">L2.6 Model Routing Platform<\u002Fspan><span class=\"chip l2 s\">L2.7 Commerce Platform<\u002Fspan><span class=\"chip l2 s\">L2.8 Data, Catalog, Search, Feedback, OpenSearch<\u002Fspan><span class=\"chip l2 s\">L2.9 Audit, Compliance, PHI Boundary, Exports, Reporting<\u002Fspan><span class=\"chip l2 s\">L2.10 Dependency Map<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:center;gap:60px;margin:7px 0;\">\n          <span style=\"display:flex;flex-direction:column;align-items:center;color:var(--ink);\"><span class=\"mono\" style=\"font-size:9px;letter-spacing:.06em;\">AUTHENTICATES · AUTHORIZES · PERSONALIZES · SERVES DATA · RUNS WORKFLOWS · NOTIFIES · ROUTES COMMERCE · RETURNS SEARCH · DISPLAYS STATUS · RETURNS ALLOWED ACTIONS<\u002Fspan><span class=\"miniglyph gdown\" style=\"border-top-color:var(--ink);\"><\u002Fspan><\u002Fspan>\n          <span style=\"display:flex;flex-direction:column;align-items:center;color:var(--ink);\"><span class=\"miniglyph gup\" style=\"border-bottom-color:var(--ink);\"><\u002Fspan><span class=\"mono\" style=\"font-size:9px;letter-spacing:.06em;\">CREATES PROFILES · UPDATES RULES · ADDS AND RUNS RECIPES · COPIES · EDITS · FAVORITES · PRINTS · LOGS · NOTES · HANDOFFS · FEEDBACK · COMMERCE · VOICE · EXPORT<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"refband active\">\n          <span class=\"rtag\">Layer 3 / Surfaces (active)<\u002Fspan>\n          <div class=\"chiprow\" style=\"margin-top:3px;\">\n            <span class=\"chip teal s\">Public Website<\u002Fspan><span class=\"chip teal s\">Free to Browse<\u002Fspan><span class=\"chip teal s\">Free with Account<\u002Fspan><span class=\"chip teal s\">Basic Household Account<\u002Fspan><span class=\"chip teal s\">Owner<\u002Fspan><span class=\"chip teal s\">Co-Owner<\u002Fspan><span class=\"chip teal s\">Caregiver<\u002Fspan><span class=\"chip teal s\">Viewer<\u002Fspan>\n            <span class=\"chip teal s\">Care Profile Setup<\u002Fspan><span class=\"chip teal s\">Household Onboarding<\u002Fspan><span class=\"chip teal s\">Recipe Library<\u002Fspan><span class=\"chip teal s\">Recipe Detail<\u002Fspan><span class=\"chip teal s\">Recipe Generation<\u002Fspan><span class=\"chip teal s\">Recipe Modification<\u002Fspan><span class=\"chip teal s\">Today View<\u002Fspan><span class=\"chip teal s\">Planner<\u002Fspan>\n            <span class=\"chip teal s\">Hydration<\u002Fspan><span class=\"chip teal s\">Food Tracking<\u002Fspan><span class=\"chip teal s\">Clean Plate Club<\u002Fspan><span class=\"chip teal s\">Eating Out<\u002Fspan><span class=\"chip teal s\">Restaurant Mode<\u002Fspan><span class=\"chip teal s\">Grocery<\u002Fspan><span class=\"chip teal s\">Notes<\u002Fspan><span class=\"chip teal s\">Delegation<\u002Fspan><span class=\"chip teal s\">Family Handoff<\u002Fspan>\n            <span class=\"chip teal s\">Voice<\u002Fspan><span class=\"chip teal s\">Translation<\u002Fspan><span class=\"chip teal s\">Notifications<\u002Fspan><span class=\"chip teal s\">Mobile Household App<\u002Fspan><span class=\"chip teal s\">Data Export<\u002Fspan><span class=\"chip future s\">Future Pro<\u002Fspan><span class=\"chip future s\">Future Clinical and Enterprise<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gap\"><\u002Fdiv>\n        <div class=\"anno ink\"><div class=\"h\">Callout / Dependency Rule<\u002Fdiv><p>Layer 1 controls. Layer 2 enforces and executes. Layer 3 interacts, displays, captures, and sends activity back to Layer 2. Layer 2 reports back to Layer 1.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== L3.12 CROSSWALK ====================== -->\n    <div class=\"scard dom\">\n      <div class=\"sh\"><span class=\"no\">L3.12<\u002Fspan><h2>BLUEPRINT SET CROSSWALK, UPSTREAM ALIGNMENT, AND COMPLETION REGISTER<\u002Fh2><span class=\"bub t\">17<\u002Fspan><span class=\"bub\">18<\u002Fspan>\n        <span class=\"meta\">FOUR-DOCUMENT SET<br>This sheet completes the current set<\u002Fspan><\u002Fdiv>\n      <div class=\"sb\">\n        <h4 class=\"subhead\">Blueprint Set Crosswalk<\u002Fh4>\n        <table class=\"cross\">\n          <thead>\n            <tr><th>Blueprint<\u002Fth><th>Primary purpose<\u002Fth><th>Active layer<\u002Fth><th>Upstream dependency<\u002Fth><th>Downstream dependency<\u002Fth><th>What it controls or explains<\u002Fth><th>What it does not own<\u002Fth><th>Engineering review notes<\u002Fth><\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr>\n              <th>Product and Service Container Blueprint<\u002Fth>\n              <td>Full system map across all three layers<\u002Ftd>\n              <td>All layers (overview)<\u002Ftd>\n              <td>None. It is the parent map.<\u002Ftd>\n              <td>Layer 1, Layer 2, and Layer 3 deep dives<\u002Ftd>\n              <td>The complete container map, zones, and the three-layer relationship<\u002Ftd>\n              <td>Sheet-level execution detail of any single layer<\u002Ftd>\n              <td>Use as the canonical index for the set<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <th>Layer 1 Control Plane Blueprint<\u002Fth>\n              <td>Expand Super Admin and control-plane governance<\u002Ftd>\n              <td>Layer 1<\u002Ftd>\n              <td>Master blueprint<\u002Ftd>\n              <td>Layer 2 services and Layer 3 surfaces it governs<\u002Ftd>\n              <td>Personnel, settings, model routes, recipe and review control, taxonomy, publishing, commerce, compliance, monitoring<\u002Ftd>\n              <td>Service execution or user surfaces<\u002Ftd>\n              <td>Confirm permission model, gate rules, and audit requirements<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <th>Layer 2 Platform Blueprint<\u002Fth>\n              <td>Expand shared platform services and dependencies<\u002Ftd>\n              <td>Layer 2<\u002Ftd>\n              <td>Master blueprint and Layer 1<\u002Ftd>\n              <td>Layer 3 surfaces it powers<\u002Ftd>\n              <td>Backend, APIs, identity, care intelligence, recipe platform, execution, model routing, commerce, data, audit<\u002Ftd>\n              <td>Control-plane rules or user interface<\u002Ftd>\n              <td>Confirm service boundaries, the gate path, and return signals<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <th>Layer 3 Surfaces Blueprint<\u002Fth>\n              <td>Expand governed user and tenant surfaces<\u002Ftd>\n              <td>Layer 3<\u002Ftd>\n              <td>Master blueprint, Layer 1, and Layer 2<\u002Ftd>\n              <td>User journeys come next<\u002Ftd>\n              <td>Public, account, role, profile, recipe, execution, commerce, feedback, and future surfaces<\u002Ftd>\n              <td>System of record, permissions, model routing, gate, taxonomy, publishing, commerce, or compliance rules<\u002Ftd>\n              <td>Confirm role visibility, displayed status, and write-back paths<\u002Ftd>\n            <\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n\n        <div class=\"gap\"><\u002Fdiv>\n        <div class=\"twocol\" style=\"grid-template-columns:1fr 1fr;align-items:start;\">\n          <div class=\"module\">\n            <div class=\"mh teal\">Alignment Rules<\u002Fdiv>\n            <div class=\"mb chiprow\">\n              <span class=\"chip teal s\">The master blueprint defines the full system map<\u002Fspan><span class=\"chip teal s\">Layer 1 expands Super Admin and control-plane governance<\u002Fspan><span class=\"chip teal s\">Layer 2 expands shared platform services and dependencies<\u002Fspan>\n              <span class=\"chip teal s\">Layer 3 expands governed user and tenant surfaces<\u002Fspan><span class=\"chip teal s\">Layer 3 completes the current blueprint set<\u002Fspan><span class=\"chip teal s\">User journey blueprint pages come next<\u002Fspan>\n              <span class=\"chip teal s\">Engineering review owns final implementation<\u002Fspan><span class=\"chip teal s\">Clinical review owns clinical safety logic<\u002Fspan><span class=\"chip teal s\">Compliance review owns PHI, HIPAA, BAA, HITRUST, HITECH, audit, export, and retention<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"module\">\n            <div class=\"mh amber\">Upstream Alignment Register<\u002Fdiv>\n            <div class=\"mb chiprow\">\n              <span class=\"chip s\">No master blueprint overwrite<\u002Fspan><span class=\"chip s\">No Layer 1 overwrite<\u002Fspan><span class=\"chip s\">No Layer 2 overwrite<\u002Fspan><span class=\"chip s\">Layer 3 maps to all three existing artifacts<\u002Fspan>\n              <span class=\"chip s\">Layer 3 uses L1 sheet references for governance<\u002Fspan><span class=\"chip s\">Layer 3 uses L2 sheet references for service execution<\u002Fspan><span class=\"chip s\">Layer 3 adds the final crosswalk to complete the visual document set<\u002Fspan>\n              <span class=\"chip s\">Future changes tracked through revision notes, not by silently replacing prior blueprints<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap\"><\u002Fdiv>\n        <div class=\"anno ink\"><div class=\"h\">Callout / Completion <span class=\"bub t\" style=\"margin-left:4px;\">17<\u002Fspan><\u002Fdiv><p>Keep the upstream blueprints intact. This Layer 3 sheet completes the set by showing how the surface layer depends on the control plane and platform. User journey blueprint pages come after this surface blueprint set is reviewed.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== LEGEND, CALLOUTS ====================== -->\n    <div class=\"gap\"><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;\">\n      <div class=\"legend\">\n        <div class=\"lh\">Legend<\u002Fdiv>\n        <div class=\"lb\">\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:13px;border:2px dashed var(--ink3);\"><\u002Fspan><\u002Fspan>Heavy top reference band: upstream Control Plane<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:13px;border:2px dashed var(--teal);\"><\u002Fspan><\u002Fspan>Middle reference band: shared Platform services<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:13px;border:3px solid var(--ink);background:rgba(29,111,106,.08);\"><\u002Fspan><\u002Fspan>Large bottom band: active Layer 3 Surfaces<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:32px;height:15px;border:1.5px solid var(--teal);background:var(--teal-soft);\"><\u002Fspan><\u002Fspan>Solid box: Layer 3 surface<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:32px;height:15px;border:1.5px dashed var(--rose);background:var(--rose-soft);\"><\u002Fspan><\u002Fspan>Dashed box: future or compliance-gated surface<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"arrowdn\"><\u002Fspan><\u002Fspan>Thin down arrow: control, configuration, service delivery<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"arrowup\"><\u002Fspan><\u002Fspan>Thin up arrow: audit, feedback, monitoring, reporting, queues<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"arrowx\"><\u002Fspan><\u002Fspan>Side arrow: user journey movement or surface-to-surface flow<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"gate\" style=\"padding:2px 5px;\"><span style=\"font-family:var(--mono);font-size:8px;color:var(--crimson);font-weight:700;\">GATE<\u002Fspan><\u002Fspan><\u002Fspan>Gate symbol: routes or stops work by status<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt amber\">REV<\u002Fspan><\u002Fspan>Amber tag: review, pending, estimated, caveat, queued, Phase 2<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt crim\">STOP<\u002Fspan><\u002Fspan>Crimson tag: stopped, denied, blocked, failed, restricted, risk<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt teal\">OK<\u002Fspan><\u002Fspan>Teal tag: active, approved, available, governed<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt p3\">P3<\u002Fspan><\u002Fspan>Rose tag: future or Phase 3, used sparingly<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt mvp\">MVP<\u002Fspan><\u002Fspan>Phase tag: MVP, Phase 2, or Phase 3<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"calidx\">\n        <div class=\"ch\">Key Callouts<\u002Fdiv>\n        <ul>\n          <li><span class=\"bub t\">1<\u002Fspan><span>Layer 3 is the governed experience layer.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">2<\u002Fspan><span>Layer 1 controls rules, gates, publishing, taxonomy, model routing, commerce, audit, and compliance.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">3<\u002Fspan><span>Layer 2 powers Layer 3 through shared backend services.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">4<\u002Fspan><span>Layer 3 never owns the system of record.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">5<\u002Fspan><span>Web and mobile share one backend.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">6<\u002Fspan><span>Account equals Household.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">7<\u002Fspan><span>Household roles control what each person can do.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">8<\u002Fspan><span>Care Profile setup happens in Layer 3. Source of truth lives in Layer 2.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">9<\u002Fspan><span>Recipe surfaces display status. Layer 2 enforces status and eligibility.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">10<\u002Fspan><span>Every generated or adapted recipe passes through the Clinical Review Gate.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub r\">11<\u002Fspan><span>Rejection Routing turns refused meals into the next practical option.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">12<\u002Fspan><span>Daily execution surfaces turn intelligence into action.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">13<\u002Fspan><span>Commerce supports execution and is governed centrally.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub a\">14<\u002Fspan><span>Feedback, audit, model, and activity signals flow back to Layer 1.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub r\">15<\u002Fspan><span>Future Pro and clinical surfaces are Phase 3 and require engineering, clinical, and compliance review.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">16<\u002Fspan><span>Layer 3 maps to the master blueprint and depends on the completed Layer 1 and Layer 2 blueprints.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">17<\u002Fspan><span>L3.12 completes the current blueprint set crosswalk.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">18<\u002Fspan><span>User journey blueprint pages come after this surface blueprint set is reviewed.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"gap\"><\u002Fdiv>\n    <div class=\"titleblock\">\n      <div class=\"tbh\">\n        <div class=\"lg2\">POP &amp; LADLE<small>LAYER 3 SURFACES DEEP DIVE<\u002Fsmall><\u002Fdiv>\n        <div style=\"font-family:var(--mono);font-size:11px;text-align:right;color:var(--teal-soft);\">SET<br><b style=\"color:#fff;font-size:14px;\">L3<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;\">\n        <div style=\"border-right:1.5px solid var(--ink);\">\n          <div class=\"tr\"><div class=\"k\">Project<\u002Fdiv><div class=\"v\">Pop &amp; Ladle<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Blueprint Set<\u002Fdiv><div class=\"v\">Layer 3 Surfaces Deep Dive<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Parent Map<\u002Fdiv><div class=\"v\">Product and Service Container Blueprint<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Upstream Map<\u002Fdiv><div class=\"v\">Layer 1 Control Plane Blueprint<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Platform Map<\u002Fdiv><div class=\"v\">Layer 2 Platform Blueprint<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Purpose<\u002Fdiv><div class=\"v\">Governed user and tenant surface blueprint for engineering review<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"tr\"><div class=\"k\">Status<\u002Fdiv><div class=\"v\">Provisional architecture<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Audience<\u002Fdiv><div class=\"v\">Product, engineering, design, clinical advisors<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Version<\u002Fdiv><div class=\"v\">v0.1<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Implementation Note<\u002Fdiv><div class=\"v\" style=\"color:var(--crimson);\">Engineering review owns final implementation<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Mapping Note<\u002Fdiv><div class=\"v\">Maps to Layer 3 of the master blueprint and depends on Layer 1 controls and
