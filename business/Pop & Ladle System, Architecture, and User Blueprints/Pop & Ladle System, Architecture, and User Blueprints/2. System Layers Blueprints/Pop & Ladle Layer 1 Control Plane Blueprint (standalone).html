002Fspan><span class=\"chip ref s\">Notification<\u002Fspan>\n            <span class=\"chip ref s\">Commerce<\u002Fspan><span class=\"chip ref s\">Retailer Routing<\u002Fspan><span class=\"chip ref s\">Search<\u002Fspan>\n            <span class=\"chip ref s\">Feedback<\u002Fspan><span class=\"chip ref s\">Audit<\u002Fspan><span class=\"chip ref s\">Compliance<\u002Fspan>\n            <span class=\"chip ref s\">Data Stores<\u002Fspan><span class=\"chip ref s\">Model Routing<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;justify-content:center;gap:60px;margin:8px 0;\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;color:var(--teal);\"><span class=\"mono\" style=\"font-size:9px;letter-spacing:.1em;\">SERVES<\u002Fspan><span class=\"arrowdn\"><\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;align-items:center;color:var(--amber);\"><span class=\"flow audit\" style=\"width:auto;\"><span class=\"head-u\"><\u002Fspan><\u002Fspan><span class=\"mono\" style=\"font-size:9px;letter-spacing:.1em;\">SIGNALS<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- layer 3 reference -->\n        <div class=\"refband\">\n          <span class=\"rtag\">Layer 3 / User and Tenant Surfaces (reference)<\u002Fspan>\n          <div class=\"chiprow\" style=\"margin-top:4px;\">\n            <span class=\"chip ref s\">Public Website<\u002Fspan><span class=\"chip ref s\">Free to Browse<\u002Fspan><span class=\"chip ref s\">Free with Account<\u002Fspan>\n            <span class=\"chip ref s\">Basic Household Account<\u002Fspan><span class=\"chip ref s\">Owner<\u002Fspan><span class=\"chip ref s\">Co-Owner<\u002Fspan>\n            <span class=\"chip ref s\">Caregiver<\u002Fspan><span class=\"chip ref s\">Viewer<\u002Fspan>\n            <span class=\"chip ref s future\">Future Pro<\u002Fspan><span class=\"chip ref s future\">Future Clinical and Enterprise<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap\"><\u002Fdiv>\n        <div class=\"anno ink\"><div class=\"h\">Callout / Summary<\u002Fdiv><p>Layer 1 controls the rules. Layer 2 runs the services. Layer 3 delivers the experience.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== LEGEND, CALLOUTS, TITLE BLOCK ====================== -->\n    <div class=\"gap\"><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.05fr 1fr 1.05fr;gap:16px;align-items:start;\">\n      <div class=\"legend\">\n        <div class=\"lh\">Legend<\u002Fdiv>\n        <div class=\"lb\">\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:16px;border:3px solid var(--ink);\"><\u002Fspan><\u002Fspan>Heavy top band: global control plane<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:16px;border:1.5px solid var(--ink);background:var(--paper2);\"><\u002Fspan><\u002Fspan>Solid box: control container<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:16px;border:1.5px dashed var(--ink3);background:rgba(27,32,38,.04);\"><\u002Fspan><\u002Fspan>Dashed box: downstream reference<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"gate\" style=\"padding:2px 5px;\"><span style=\"font-family:var(--mono);font-size:8px;color:var(--crimson);font-weight:700;\">GATE<\u002Fspan><\u002Fspan><\u002Fspan>Gate symbol: routes or stops work<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"arrowdn\"><\u002Fspan><\u002Fspan>Thin down arrow: command and configuration<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"head-u\" style=\"border-bottom-color:var(--amber);\"><\u002Fspan><\u002Fspan>Thin up arrow: audit, feedback, monitoring, reporting<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt amber\">REV<\u002Fspan><\u002Fspan>Amber tag: review or pending<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt crim\">STOP<\u002Fspan><\u002Fspan>Crimson tag: stopped, denied, blocked, risk<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt teal\">OK<\u002Fspan><\u002Fspan>Teal tag: approved, active, governed service<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt mvp\">MVP<\u002Fspan><\u002Fspan>Phase tag: MVP, Phase 2, or Phase 3<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"calidx\">\n        <div class=\"ch\">Key Callouts<\u002Fdiv>\n        <ul>\n          <li><span class=\"bub t\">1<\u002Fspan><span>Super Admin controls the whole system.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">2<\u002Fspan><span>Super Admin is private internal Pop &amp; Ladle tooling only.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">3<\u002Fspan><span>Personnel and permissions protect global control.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">4<\u002Fspan><span>Global settings configure shared platform services.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">5<\u002Fspan><span>Care Team specialists run through isolated model routes.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">6<\u002Fspan><span>ChairwomanAI owns final synthesis.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">7<\u002Fspan><span>Every recipe passes through the Clinical Review Gate.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">8<\u002Fspan><span>Master Recipe Library publishing is controlled globally.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">9<\u002Fspan><span>Taxonomy controls discovery, filtering, planning, and future Smart Filtering.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub a\">10<\u002Fspan><span>Commerce routing is governed centrally.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub a\">11<\u002Fspan><span>Audit, model runs, review queues, and reports flow back up.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\" style=\"background:var(--rose);\">12<\u002Fspan><span>Layer 1 maps to the master blueprint and does not replace it.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"titleblock\">\n        <div class=\"tbh\">\n          <div class=\"lg2\">POP &amp; LADLE<small>LAYER 1 CONTROL PLANE DEEP DIVE<\u002Fsmall><\u002Fdiv>\n          <div style=\"font-family:var(--mono);font-size:11px;text-align:right;color:var(--teal-soft);\">SET<br><b style=\"color:#fff;font-size:14px;\">L1<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"tr\"><div class=\"k\">Project<\u002Fdiv><div class=\"v\">Pop &amp; Ladle<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Blueprint Set<\u002Fdiv><div class=\"v\">Layer 1 Control Plane Deep Dive<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Parent Map<\u002Fdiv><div class=\"v\">Product and Service Container Blueprint<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Purpose<\u002Fdiv><div class=\"v\">Super Admin control-plane blueprint for engineering review<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Status<\u002Fdiv><div class=\"v\">Provisional architecture<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Audience<\u002Fdiv><div class=\"v\">Product, engineering, design, clinical advisors<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Version<\u002Fdiv><div class=\"v\">v0.1<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Implementation Note<\u002Fdiv><div class=\"v\" style=\"color:var(--crimson);\">Engineering review owns final implementation<\u002Fdiv><\u002Fdiv>\n          <div class=\"tr\"><div class=\"k\">Mapping Note<\u002Fdiv><div class=\"v\">Maps to Layer 1 of the existing master blueprint and does not replace it<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv><!-- /frame -->\n<\u002Fdiv><!-- /sheet -->\n\n\n<\u002Fbody><\u002Fhtml>"
