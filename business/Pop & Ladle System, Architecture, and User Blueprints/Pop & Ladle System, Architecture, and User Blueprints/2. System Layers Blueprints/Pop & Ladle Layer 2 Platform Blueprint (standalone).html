    // would push the parser into quirks mode. DOMParser always emits a <head>

 recipe, plan, and hydration status<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"akh\" style=\"color:var(--ink);\"><span class=\"miniglyph gup akdot\" style=\"border-bottom-color:var(--ink);\"><\u002Fspan>Layer 3 to Layer 2<\u002Fdiv>\n        <div class=\"akl\">Creates profiles · Updates hard rules · Adds recipes · Runs recipe generation · Logs hydration · Logs food · Creates notes · Creates handoffs · Creates feedback · Uses grocery and commerce · Triggers notifications · Captures voice<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"akh\" style=\"color:var(--amber);\"><span class=\"arrowup akdot\"><\u002Fspan>Layer 2 to Layer 1<\u002Fdiv>\n        <div class=\"akl\">Reports · Queues · Alerts · Audits · Logs model runs · Summarizes usage, review outcomes, system health, and compliance events<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== L2.0 OVERVIEW ====================== -->\n    <div class=\"scard dom\">\n      <div class=\"sh\"><span class=\"no\">L2.0<\u002Fspan><h2>LAYER 2 PLATFORM OVERVIEW<\u002Fh2><span class=\"bub t\">1<\u002Fspan><span class=\"bub\">2<\u002Fspan><span class=\"bub\">3<\u002Fspan>\n        <span class=\"meta\">SHARED PLATFORM SERVICES<br>The engine room between control plane and surfaces<\u002Fspan><\u002Fdiv>\n      <div class=\"sb\">\n        <!-- three bands -->\n        <div class=\"refband\" style=\"margin-bottom:10px;\">\n          <span class=\"rtag\">Layer 1 / Control Plane (upstream reference)<\u002Fspan>\n          <div class=\"chiprow\" style=\"margin-top:3px;\">\n            <span class=\"chip ref s\">L1.1 Personnel and Permissions<\u002Fspan><span class=\"chip ref s\">L1.2 Global Settings<\u002Fspan><span class=\"chip ref s\">L1.3 Model Route Registry<\u002Fspan>\n            <span class=\"chip ref s\">L1.4 Recipe and Clinical Review Control<\u002Fspan><span class=\"chip ref s\">L1.5 Library, Taxonomy, Publishing<\u002Fspan><span class=\"chip ref s\">L1.6 om<\u002Fdiv><p>Layer 2 is the engine room. It enforces control-plane rules and powers every surface. Layer 1 sends command, configuration, policy, feature gates, taxonomy, review rules, model route rules, publishing rules, commerce rules, and compliance rules down. Layer 3 sends profile changes, recipe actions, planning activity, logs, notes, handoffs, voice, commerce actions, and feedback back into Layer 2. Layer 2 sends audit logs, model logs, review queue status, clinical review outcomes, usage, health, compliance events, and reports back up to Layer 1.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== L2.1 BACKEND / API ====================== -->\n    <div class=\"scard\">\n      <div class=\"sh\"><span class=\"no\">L2.1<\u002Fspan><h2>SHARED BACKEND, API FAMILIES, AND SERVICE BOUNDARY MAP<\u002Fh2><span class=\"bub t\">4<\u002Fspan>\n        <span class=\"meta\">CORE PLATFORM<br>One backend for web and mobile<\u002Fspan><\u002Fdiv>\n      <div class=\"sb\">\n        <div class=\"twocol\" style=\"grid-template-columns:1fr 1.35fr;align-items:start;\">\n          <div class=\"module\">\n            <div class=\"mh teal\">Shared Backend and Boundary<\u002Fdiv>\n            <div class=\"mb chiprow\">\n              <span class=\"chip teal s\">Shared Backend APIs<\u002Fspan><span class=\"chip teal s\">API Gateway or API Boundary<\u002Fspan><span class=\"chip teal s\">Service Authorization<\u002Fspan>\n              <span class=\"chip teal s\">Tenant Context Resolver<\u002Fspan><span class=\"chip teal s\">Role Permission Resolver<\u002Fspan><span class=\"chip teal s\">Request Validation<\u002Fspan>\n              <span class=\"chip teal s\">Audit Event Writer<\u002Fspan><span class=\"chip teal s\">Event Bus<\u002Fspan><span class=\"chip teal s\">Background Jobs<\u002Fspan>\n              <span class=\"chip teal s\">Webhook Receiver<\u002Fspan><span class=\"chip teal s\">Integration Boundary<\u002Fspan><span class=\"chip teal s h Service<\u002Fspan><span class=\"chip teal s\">User Service<\u002Fspan><span class=\"chip teal s\">Session Service<\u002Fspan><span class=\"chip teal s\">Household Tenant Service<\u002Fspan>\n              <span class=\"chip teal s\">Membership Service<\u002Fspan><span class=\"chip teal s\">Role and Permission Service<\u002Fspan><span class=\"chip teal s\">Invitation Service<\u002Fspan><span class=\"chip teal s\">Billing and Plan Service<\u002Fspan>\n              <span class=\"chip teal s\">Entitlement Service<\u002Fspan><span class=\"chip teal s\">Feature Gate Service<\u002Fspan><span class=\"chip teal s\">Account Status Service<\u002Fspan><span class=\"chip teal s\">Tenant Data Boundary Service<\u002Fspan>\n              <span class=\"chip teal s\">Access Log Service<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"module\">\n            <div class=\"mh\">Tenancy and Role Rules<\u002Fdiv>\n            <div class=\"mb\">\n              <div class=\"chiprow\">\n                <span class=\"chip s\">Account equals Household<\u002Fspan><span class=\"chip s\">Household is the tenant<\u002Fspan>\n                <span class=\"chip s\">Owner owns the account<\u002Fspan><span class=\"chip s\">Co-Owner: all except billing and deletion<\u002Fspan>\n                <span class=\"chip s\">Caregiver: working recipe and assigned execution<\u002Fspan><span class=\"chip s\">Viewer: read-only plus favorite, copy, print<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"anno\" style=\"margin-top:6px;padding:8px 11px;\"><p style=\"font-size:11.5px;\">Every person receiving care, caregiver, recipe copy, plan, log, notification, note, event, permission, and audit record belongs to a Household.<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap s\"><\u002Fdiv>\n        <div class=\"twocol\" style=\"grid-template-columns:1fr 1.1fr;align-items:start;\">\n          <div class=\"module\">\n            <div class=\"mh ref\">Resolution Dependency<\u002Fdiv>\n            <div class=\"mb\" style=\"font-family:var(--mono);font-size:11px;line-height:1.5;color:var(--ink2);\">\n              Layer 1 defines global role defaults and permission rules. Layer 2 resolves role and permission for each request. Layer 3 shows or hides actions based on the Layer 2 permission result.\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"module\">\n            <div class=\"mh amber\">Plan Dependency<\u002Fdiv>\n            <div class=\"mb chiprow\">\n              <span class=\"chip s\">Free to Browse<\u002Fspan><span class=\"chip s\">Free with Account<\u002Fspan><span class=\"chip s\">Basic at $9.99 per month <span class=\"pt mvp\">MVP<\u002Fspan><\u002Fspan>\n              <span class=\"chip future s\">$19.99 tier: one person, up to five caregivers<\u002Fspan><span class=\"chip future s\">$49.99 tier: up to three people, unlimited caregivers<\u002Fspan>\n              <span class=\"chip future s\">Future Pro and enterprise plan logic<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap s\"><\u002Fdiv>\n        <div class=\"depmap\">\n          <div class=\"depcol\"><div class=\"dh ctl\"><span class=\"miniglyph gdown akdot\"><\u002Fspan>Controlled by Layer 1<\u002Fdiv><div class=\"db chiprow\">\n            <span class=\"chip ref s\">L1.1 Personnel and Permissions<\u002Fspan><span class=\"chip ref s\">L1.2 Global System Settings<\u002Fspan><span class=\"chip ref s\">L1.7 Audit and Compliance<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"depcol\"><div class=\"dh exe\">Executed in Layer 2<\u002Fdiv><div class=\"db chiprow\">\n            <span class=\"chip teal s\">Auth<\u002Fspan><span class=\"chip teal s\">Household Tenant<\u002Fspan><span class=\"chip teal s\">Membership<\u002Fspan><span class=\"chip teal s\">Roles<\u002Fspan><span class=\"chip teal s\">Billing<\u0  <div class=\"gap s\"><\u002Fdiv>\n        <div class=\"module\">\n          <div class=\"mh ref\">Service Read Dependencies<\u002Fdiv>\n          <div class=\"mb\" style=\"font-family:var(--mono);font-size:10.5px;line-height:1.6;color:var(--ink2);\">\n            Recipe services read Care Profile, hard rules, intake limits, taste, texture, accepted meals, refused meals, and Rejection Routing. Planner reads meal rhythm, energy windows, caregiver context, kitchen capacity, and hydration needs. Hydration reads hydration needs, limits, reminders, and caregiver schedule. Grocery reads accepted foods, refused foods, kitchen capacity, planned recipes, and Household settings. Notification reads medication timing, meal rhythm, hydration rules, and caregiver permissions. Smart Filtering reads Care Profile, hard rules, intake limits, nutrition values, current day ledger, remaining day plan, accepted and refused foods, Rejection Routing, texture needs, medication timing, protein timing, caregiver schedule, culture and food memory, kitchen capacity, and Household settings.\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap s\"><\u002Fdiv>\n        <div class=\"depmap\">\n          <div class=\"depcol\"><div class=\"dh ctl\"><span class=\"miniglyph gdown akdot\"><\u002Fspan>Controlled by Layer 1<\u002Fdiv><div class=\"db chiprow\">\n            <span class=\"chip ref s\">L1.2 Global System Settings<\u002Fspan><span class=\"chip ref s\">L1.4 Clinical Review Control<\u002Fspan><span class=\"chip ref s\">L1.5 Taxonomy and Category Control<\u002Fspan><span class=\"chip ref s\">L1.7 Compliance and Audit<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"depcol\"><div class=\"dh exe\">Executed in Layer 2<\u002Fdiv><div class=\"db chiprow\">\n            <span class=\"chip teal s\">Care Profile Service<\u002Fspan><span class=\"chip teal s\">Hard Rules Service<\u002Fspan><span class=\"chip teal s\">Caregiver Profile Service<\u002Fspan><span class=\"chip teal ervice<\u002Fspan><span class=\"chip teal s\">Notes Service<\u002Fspan>\n            <span class=\"chip teal s\">Delegation Service<\u002Fspan><span class=\"chip teal s\">Family Handoff Service<\u002Fspan><span class=\"chip teal s\">Caregiver Wellness Service<\u002Fspan><span class=\"chip teal s\">Notification Service<\u002Fspan>\n            <span class=\"chip teal s\">Reminder Service<\u002Fspan><span class=\"chip teal s\">Escalation Service<\u002Fspan><span class=\"chip teal s\">Data Export Service<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap s\"><\u002Fdiv>\n        <div class=\"module\">\n          <div class=\"mh ref\">Service Read and Write Dependencies<\u002Fdiv>\n          <div class=\"mb\" style=\"font-family:var(--mono);font-size:10.5px;line-height:1.6;color:var(--ink2);\">\n            Planner reads Household Recipe Copies, Care Profile, hard rules, meal rhythm, energy windows, caregiver context, kitchen capacity, hydration needs, and calendar availability. Day Plan reads planner items, meal timing, hydration targets, tasks, recipe prep time, caregiver availability, and calendar events. Hydration reads hydration needs, limits, alerts, care setting, and caregiver permissions. Food Tracking writes accepted meals, refused meals, rejection reasons, and Clean Plate events. Rejection Routing reads refused meals, rejection reasons, accepted meals, hard rules, Care Profile, current plan, and available alternatives. Grocery List reads planned recipes, Household recipe copies, pantry products, accepted and refused foods, kitchen capacity, and retailer availability. Notifications read plan events, hydration rules, medication timing, caregiver roles, and escalation rules. Family Handoff reads notes, tasks, plans, hydration status, meal status, and caregiver assignments.\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap s\"><\u002Fdiv>\n        <div class=\"depmap\">\n          <div class=\"depcol\"><div cl t<\u002Fspan><span class=\"chip ref s\">Caregiver handoff<\u002Fspan><span class=\"chip ref s\">Notes<\u002Fspan><span class=\"chip ref s\">Delegation<\u002Fspan><span class=\"chip ref s\">Notifications<\u002Fspan><span class=\"chip ref s\">Mobile app<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"depcol\"><div class=\"dh rep\"><span class=\"miniglyph gup akdot\"><\u002Fspan>Reported back to Layer 1<\u002Fdiv><div class=\"db chiprow\">\n            <span class=\"chip amber s\">Completed plan items<\u002Fspan><span class=\"chip amber s\">Skipped plan items<\u002Fspan><span class=\"chip amber s\">Hydration logs<\u002Fspan><span class=\"chip amber s\">Skipped drinks<\u002Fspan><span class=\"chip amber s\">Food logs<\u002Fspan><span class=\"chip amber s\">Accepted meals<\u002Fspan><span class=\"chip amber s\">Refused meals<\u002Fspan><span class=\"chip amber s\">Rejection reasons<\u002Fspan><span class=\"chip amber s\">Grocery actions<\u002Fspan><span class=\"chip amber s\">Notifications<\u002Fspan><span class=\"chip amber s\">Escalations<\u002Fspan><span class=\"chip amber s\">Caregiver notes<\u002Fspan><span class=\"chip amber s\">Handoff activity<\u002Fspan><span class=\"chip amber s\">Audit events<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap\"><\u002Fdiv>\n        <div class=\"twocol\">\n          <div class=\"anno\"><div class=\"h\">Callout / Execution <span class=\"bub\" style=\"margin-left:4px;\">11<\u002Fspan><\u002Fdiv><p>Daily execution turns recipe intelligence into what gets cooked, served, tracked, adjusted, and handed off.<\u002Fp><\u002Fdiv>\n          <div class=\"anno rose\"><div class=\"h\">Callout / Kitchen Capacity<\u002Fdiv><p>Kitchen capacity affects planning, prep, storage, batching, grocery flow, and caregiver workload.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== L2.6 MODEL ROUTING ====================== -->\n    <div class=\"scard class=\"mh ref\">Flow<\u002Fdiv>\n          <div class=\"mb\" style=\"font-family:var(--mono);font-size:10.5px;line-height:1.6;color:var(--ink2);\">\n            Recipe package enters Model Routing Service. Input Package Builder creates a structured package. Specialists run in parallel. Specialist outputs go to the Specialist Output Store. ChairwomanAI receives all specialist outputs and creates the final synthesis. Synthesis goes to the Clinical Review Gate. Model run logs, errors, retries, latency, prompt versions, output references, and synthesis references go to Layer 1 monitoring.\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap s\"><\u002Fdiv>\n        <div class=\"depmap\">\n          <div class=\"depcol\"><div class=\"dh ctl\"><span class=\"miniglyph gdown akdot\"><\u002Fspan>Controlled by Layer 1<\u002Fdiv><div class=\"db chiprow\">\n            <span class=\"chip ref s\">L1.3 Model Route Registry and Synthesis Control<\u002Fspan><span class=\"chip ref s\">L1.4 Clinical Review Control<\u002Fspan><span class=\"chip ref s\">L1.7 Model Run Monitoring and Audit<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"depcol\"><div class=\"dh exe\">Executed in Layer 2<\u002Fdiv><div class=\"db chiprow\">\n            <span class=\"chip teal s\">Model Routing Service<\u002Fspan><span class=\"chip teal s\">Input Package Builder<\u002Fspan><span class=\"chip teal s\">Specialist Parallel Review<\u002Fspan><span class=\"chip teal s\">Output Schema Validation<\u002Fspan><span class=\"chip teal s\">Specialist Output Store<\u002Fspan><span class=\"chip teal s\">ChairwomanAI Synthesis<\u002Fspan><span class=\"chip teal s\">Synthesis Output Store<\u002Fspan><span class=\"chip teal s\">Gate Handoff<\u002Fspan><span class=\"chip teal s\">Model Run Log<\u002Fspan><span class=\"chip teal s\">Error Handler<\u002Fspan><span class=\"chip teal s\">Retry Policy<\u002Fspan><span class=\"chip teal s\">Fallback Policy<\u002Fspan><span class=\"chip teal s\">Monitoring<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"depcol\"><div class=\"dh use\"><span class=\"miniglyph gdown akdot\"><\u002Fspan>Used by Layer 3<\u002Fdiv><div class=\"db chiprow\">\n            <span class=\"chip ref s\">Recipe generation<\u002Fspan><span class=\"chip ref s\">Recipe adaptation<\u002Fspan><span class=\"chip ref s\">Flavor modification<\u002Fspan><span class=\"chip ref s\">Caregiver-ready output<\u002Fspan><span class=\"chip ref s future\">Future Pro review workflows<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"depcol\"><div class=\"dh rep\"><span class=\"miniglyph gup akdot\"><\u002Fspan>Reported back to Layer 1<\u002Fdiv><div class=\"db chiprow\">\n            <span class=\"chip amber s\">Model route used<\u002Fspan><span class=\"chip amber s\">Prompt version<\u002Fspan><span class=\"chip amber s\">Specialist output reference<\u002Fspan><span class=\"chip amber s\">Synthesis reference<\u002Fspan><span class=\"chip amber s\">Gate result<\u002Fspan><span class=\"chip amber s\">Error state<\u002Fspan><span class=\"chip amber s\">Latency<\u002Fspan><span class=\"chip amber s\">Retry status<\u002Fspan><span class=\"chip amber s\">Fallback status<\u002Fspan><span class=\"chip amber s\">Reviewer notes<\u002Fspan><span class=\"chip amber s\">Audit reference<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap\"><\u002Fdiv>\n        <div class=\"threecol\">\n          <div class=\"anno\"><div class=\"h\">Callout<\u002Fdiv><p>Specialists run in parallel and do not overwrite each other.<\u002Fp><\u002Fdiv>\n          <div class=\"anno\"><div class=\"h\">Callout <span class=\"bub\" style=\"margin-left:4px;\">10<\u002Fspan><\u002Fdiv><p>ChairwomanAI owns final synthesis.<\u002Fp><\u002Fdiv>\n          <div class=\"anno amber\"><div class=\"h\">Callout / Logging<\u002Fdiv><p>Every model run creates a log record.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ==      <div class=\"gap\"><\u002Fdiv>\n        <div class=\"twocol\">\n          <div class=\"anno amber\"><div class=\"h\">Callout / Phased Scaling<\u002Fdiv><p>Profile-based PHI workflows and Smart Filtering scale after compliance readiness.<\u002Fp><\u002Fdiv>\n          <div class=\"anno ink\"><div class=\"h\">Callout / Platform Responsibility<\u002Fdiv><p>Audit and access logs are platform responsibilities, not user interface features.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== L2.10 DEPENDENCY MAP ====================== -->\n    <div class=\"scard dom\">\n      <div class=\"sh\"><span class=\"no\">L2.10<\u002Fspan><h2>DEPENDENCY MAP BETWEEN LAYER 1, LAYER 2, AND LAYER 3<\u002Fh2><span class=\"bub t\">14<\u002Fspan>\n        <span class=\"meta\">SUMMARY DEPENDENCY MAP<br>Rules down, services across, signals up<\u002Fspan><\u002Fdiv>\n      <div class=\"sb\">\n        <!-- L1 band -->\n        <div class=\"refband\">\n          <span class=\"rtag\">Layer 1 / Control Plane (reference)<\u002Fspan>\n          <div class=\"chiprow\" style=\"margin-top:3px;\">\n            <span class=\"chip ref s\">L1.1 Personnel and Permissions<\u002Fspan><span class=\"chip ref s\">L1.2 Global System Settings<\u002Fspan><span class=\"chip ref s\">L1.3 Model Route Registry<\u002Fspan>\n            <span class=\"chip ref s\">L1.4 Recipe Generation and Clinical Review Control<\u002Fspan><span class=\"chip ref s\">L1.5 Master Library, Taxonomy, Categories, Publishing<\u002Fspan>\n            <span class=\"chip ref s\">L1.6 Product, Affiliate, Commerce, Retailer Routing<\u002Fspan><span class=\"chip ref s\">L1.7 Compliance, Audit, Logs, Queues, Reporting<\u002Fspan><span class=\"chip ref s\">L1.8 Control Flow Map<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:center;gap:70px;margin:8px 0;\">\n          <span style=\"display:flex;flex-direction:column;align-items:center;color:var(--teal);\"><span class=\"mono\" style=\"font-size:9px;letter-spacing:.08em;\">CONTROLS · CONFIGURES · GATES · PUBLISHES · MONITORS · AUDITS<\u002Fspan><span class=\"arrowdn\"><\u002Fspan><\u002Fspan>\n          <span style=\"display:flex;flex-direction:column;align-items:center;color:var(--amber);\"><span class=\"arrowup\"><\u002Fspan><span class=\"mono\" style=\"font-size:9px;letter-spacing:.08em;\">REPORTS · QUEUES · ALERTS · AUDITS · LOGS MODEL RUNS · SUMMARIZES<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <!-- L2 band -->\n        <div class=\"refband active\">\n          <span class=\"rtag\">Layer 2 / Platform (active)<\u002Fspan>\n          <div class=\"chiprow\" style=\"margin-top:3px;\">\n            <span class=\"chip teal s\">Auth<\u002Fspan><span class=\"chip teal s\">Household Tenant<\u002Fspan><span class=\"chip teal s\">Membership<\u002Fspan><span class=\"chip teal s\">Roles<\u002Fspan><span class=\"chip teal s\">Billing<\u002Fspan><span class=\"chip teal s\">Shared Backend APIs<\u002Fspan>\n            <span class=\"chip teal s\">Care Profile<\u002Fspan><span class=\"chip teal s\">Hard Rules<\u002Fspan><span class=\"chip teal s\">Caregiver Profile<\u002Fspan><span class=\"chip teal s\">Recipe Services<\u002Fspan><span class=\"chip teal s\">Recipe Generation Factory<\u002Fspan>\n            <span class=\"chip teal s\">Master Recipe Library<\u002Fspan><span class=\"chip teal s\">Household Recipe Copy<\u002Fspan><span class=\"chip teal s\">Clinical Review Gate<\u002Fspan><span class=\"chip teal s\">Planner<\u002Fspan><span class=\"chip teal s\">Day Plan<\u002Fspan>\n            <span class=\"chip teal s\">Hydration<\u002Fspan><span class=\"chip teal s\">Food Tracking<\u002Fspan><span class=\"chip teal s\">Clean Plate<\u002Fspan><span class=\"chip teal s\">Eating Out<\u002Fspan><span class=\"chip teal s\">Restaurant Mode<\u002Fspan><span class=\"chip teal s\">Grocery<\u002Fspan>\n            <span class=\"chip teal s\">Voice Capture<\u002Fspan><span class=\"chip teal s\">Translation<\u002Fspan><span class=\"chip teal s\">Notification<\u002Fspan><span class=\"chip teal s\">Commerce<\u002Fspan><span class=\"chip teal s\">Retailer Routing<\u002Fspan><span class=\"chip teal s\">Product Catalog<\u002Fspan>\n            <span class=\"chip teal s\">Search<\u002Fspan><span class=\"chip teal s\">Feedback<\u002Fspan><span class=\"chip teal s\">OpenSearch Feedback Loop<\u002Fspan><span class=\"chip teal s\">Audit<\u002Fspan><span class=\"chip teal s\">Compliance Boundary<\u002Fspan><span class=\"chip teal s\">Data Stores<\u002Fspan>\n            <span class=\"chip teal s\">Catalogs<\u002Fspan><span class=\"chip teal s\">Model Routing<\u002Fspan><span class=\"chip teal s\">Reporting<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:center;gap:70px;margin:8px 0;\">\n          <span style=\"display:flex;flex-direction:column;align-items:center;color:var(--ink);\"><span class=\"mono\" style=\"font-size:9px;letter-spacing:.08em;\">AUTHENTICATES · AUTHORIZES · PERSONALIZES · SERVES DATA · RUNS WORKFLOWS · SENDS NOTIFICATIONS · ROUTES COMMERCE · RETURNS SEARCH · DISPLAYS STATUS<\u002Fspan><span class=\"miniglyph gdown\" style=\"border-top-color:var(--ink);\"><\u002Fspan><\u002Fspan>\n          <span style=\"display:flex;flex-direction:column;align-items:center;color:var(--ink);\"><span class=\"miniglyph gup\" style=\"border-bottom-color:var(--ink);\"><\u002Fspan><span class=\"mono\" style=\"font-size:9px;letter-spacing:.08em;\">CREATES PROFILES · UPDATES HARD RULES · ADDS RECIPES · RUNS GENERATION · LOGS HYDRATION AND FOOD · NOTES · HANDOFFS · FEEDBACK · COMMERCE · VOICE<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <!-- L3 band -->\n        <div class=\"refband\">\n          <span class=\"rtag\">Layer 3 / Surfaces (reference)<\u002Fspan>\n          <div class=\"chiprow\" style=\"margin-top:3px;\">\n            <span class=\"chip ref s\">Public Website<\u002Fspan><span class=\"chip ref s\">Free to Browse<\u002Fspan><span class=\"chip ref s\">Free with Account<\u002Fspan><span class=\"chip ref s\">Basic Household Account<\u002Fspan>\n            <span class=\"chip ref s\">Owner<\u002Fspan><span class=\"chip ref s\">Co-Owner<\u002Fspan><span class=\"chip ref s\">Caregiver<\u002Fspan><span class=\"chip ref s\">Viewer<\u002Fspan>\n            <span class=\"chip ref s\">Mobile Household App<\u002Fspan><span class=\"chip ref s future\">Future Pro<\u002Fspan><span class=\"chip ref s future\">Future Clinical and Enterprise<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"gap\"><\u002Fdiv>\n        <div class=\"anno ink\"><div class=\"h\">Callout / Dependency Rule<\u002Fdiv><p>Layer 1 sets rules. Layer 2 enforces and executes. Layer 3 interacts and generates activity. Layer 2 reports back to Layer 1.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ====================== LEGEND, CALLOUTS, TITLE BLOCK ====================== -->\n    <div class=\"gap\"><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;\">\n      <div class=\"legend\">\n        <div class=\"lh\">Legend<\u002Fdiv>\n        <div class=\"lb\">\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:14px;border:2px dashed var(--ink3);\"><\u002Fspan><\u002Fspan>Heavy top reference band: upstream Control Plane<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:14px;border:3px solid var(--ink);background:rgba(29,111,106,.08);\"><\u002Fspan><\u002Fspan>Large middle band: active Platform layer<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:36px;height:14px;border:2px dashed var(--ink3);\"><\u002Fspan><\u002Fspan>Bottom reference band: downstream Surfaces<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:32px;height:16px;border:1.5px solid var(--teal);background:var(--teal-soft);\"><\u002Fspan><\u002Fspan>Solid box: Layer 2 service<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span style=\"width:32px;height:16px;border:1.5px dashed var(--ink3);background:rgba(27,32,38,.03);\"><\u002Fspan><\u002Fspan>Dashed box: Layer 1 or Layer 3 reference<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"gate\" style=\"padding:2px 5px;\"><span style=\"font-family:var(--mono);font-size:8px;color:var(--crimson);font-weight:700;\">GATE<\u002Fspan><\u002Fspan><\u002Fspan>Gate symbol: routes or stops work<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"arrowdn\"><\u002Fspan><\u002Fspan>Thin down arrow: command, configuration, service delivery<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"arrowup\"><\u002Fspan><\u002Fspan>Thin up arrow: audit, feedback, monitoring, reporting, queues<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"arrowx\"><\u002Fspan><\u002Fspan>Side arrow: service dependency inside Layer 2<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt amber\">REV<\u002Fspan><\u002Fspan>Amber tag: review, pending, estimated, caveat, queued<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt crim\">STOP<\u002Fspan><\u002Fspan>Crimson tag: stopped, denied, blocked, failed, risk<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt teal\">OK<\u002Fspan><\u002Fspan>Teal tag: approved, active, governed, executed service<\u002Fdiv>\n          <div class=\"lg\"><span class=\"gl\"><span class=\"pt mvp\">MVP<\u002Fspan><\u002Fspan>Phase tag: MVP, Phase 2, or Phase 3<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"calidx\">\n        <div class=\"ch\">Key Callouts<\u002Fdiv>\n        <ul>\n          <li><span class=\"bub t\">1<\u002Fspan><span>Layer 2 is the shared platform engine.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">2<\u002Fspan><span>Layer 1 controls Layer 2 through rules, settings, gates, and policies.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">3<\u002Fspan><span>Layer 2 powers Layer 3 through shared backend services.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">4<\u002Fspan><span>Web and mobile share one backend.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">5<\u002Fspan><span>Account equals Household, and tenant context is resolved before data access.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub t\">6<\u002Fspan><span>Care Profile is the personalization source of truth.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">7<\u002Fspan><span>Hard rules are deterministic boundaries.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">8<\u002Fspan><span>Recipe Generation, Master Recipe Library, and Household Recipe Copy are separate services.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">9<\u002Fspan><span>Every generated or adapted recipe passes through the Clinical Review Gate.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">10<\u002Fspan><span>ChairwomanAI synthesis is executed in Layer 2 under Layer 1 model route control.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\">11<\u002Fspan><span>Daily execution turns intelligence into plans, hydration, meals, grocery, and handoff.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub a\">12<\u002Fspan><span>Data, feedback, audit, and model logs flow back to Layer 1.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\" style=\"background:var(--rose);\">13<\u002Fspan><span>Layer 2 maps to the master blueprint and depends on the completed Layer 1 blueprint.<\u002Fspan><\u002Fli>\n          <li><span class=\"bub\" style=\"background:var(--rose);\">14<\u002Fspan><span>Layer 2 shows upstream controls, downstream consumers, and return signals on every major service group.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n
