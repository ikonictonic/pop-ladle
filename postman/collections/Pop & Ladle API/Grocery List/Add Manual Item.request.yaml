$kind: http-request
url: "{{baseUrl}}/api/v1/households/{{householdId}}/grocery-list/items"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "careRecipientId": "{{careRecipientId}}",
      "itemText": "Paper towels"
    }
auth:
  type: bearer
  credentials:
    token: "{{clerkSessionToken}}"
order: 28200
