$kind: http-request
url: "{{baseUrl}}/api/v1/households/{{householdId}}/transfer-ownership"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "memberId": "{{memberId}}"
    }
auth:
  type: bearer
  credentials:
    token: "{{clerkSessionToken}}"
order: 3300
