$kind: http-request
url: "{{baseUrl}}/api/v1/households/{{householdId}}/members/{{memberId}}/role"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "role": "caregiver"
    }
auth:
  type: bearer
  credentials:
    token: "{{clerkSessionToken}}"
order: 8000
