$kind: http-request
url: "{{baseUrl}}/api/v1/admin/privacy-requests/{{privacyRequestId}}"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "status": "approved",
      "reason": "Verified the requester identity."
    }
auth:
  type: bearer
  credentials:
    token: "{{clerkSessionToken}}"
order: 25300
