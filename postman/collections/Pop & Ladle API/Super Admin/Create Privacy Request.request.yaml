$kind: http-request
url: "{{baseUrl}}/api/v1/admin/privacy-requests"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "requestType": "export_user",
      "householdId": "{{householdId}}",
      "reason": "Owner requested a data export by email."
    }
auth:
  type: bearer
  credentials:
    token: "{{clerkSessionToken}}"
order: 25200
