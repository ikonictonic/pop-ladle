$kind: http-request
url: "{{baseUrl}}/api/v1/households/{{householdId}}/invites"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "caregiver@example.com",
      "role": "caregiver"
    }
auth:
  type: bearer
  credentials:
    token: "{{clerkSessionToken}}"
order: 11000
